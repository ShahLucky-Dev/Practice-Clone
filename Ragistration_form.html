<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration form</title>
    <style>
      div {
        height: fit-content;
        width: fit-content;
        text-align: center;
        border: 1.5px solid black;
        background-color: rgb(181, 115, 244);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px grey;
      }

      .hvr:hover {
        border: 3px solid rgb(0, 90, 138);
      }

      body {
        display: flex;
        justify-content: center;
      }

      input {
        padding: 10px;
        margin: 10px;
        border-radius: 10px;
      }

      button {
        cursor: pointer;
        padding: 10px;
        border-radius: 10px;
      }

      button:hover {
        background-color: rgb(109, 246, 246);
        color: beige;
      }
    </style>
  </head>
  <body>
    <div id="div">
      <h1>Enter your name :</h1>
      <input
        class="hvr"
        id="name"
        type="text"
        placeholder="enter your name"
        required
      />
      <br />
      <h1>Enter your Email:</h1>
      <input class="hvr" type="email" placeholder="enter your email" required />
      <br />
      <h1>Enter your age</h1>
      <input type="date" />
      <h1>Select your gender:</h1>
      <input type="radio" value="male" name="gender" />male
      <input type="radio" value="female" name="gender" />female

      <br />
      <h1>Enter your password:</h1>
      <input
        type="password"
        class="hvr"
        id="password"
        placeholder="enter your password"
      />
      <br />
      <h1>Select your City:</h1>
      <select class="hvr">
        <option>Delhi</option>
        <option>Surat</option>
        <option>Ahemdabad</option>
        <option>mathura</option>
      </select>

      <h1>Select your Hobby:</h1>
      <input type="checkbox" />Cricket <input type="checkbox" />Singing
      <input type="checkbox" />Trevelling <input type="checkbox" />Gaming

      <br />

      <br />
      <button id="btn" class="hvr">Submit</button>
      <button id="btn1" class="hvr">Click Me!</button>
      <button type="reset" class="hvr">Reset</button>
    </div>
    <script>
      let btn = document.getElementById("btn");
      btn.addEventListener("click", () => {
        let name = document.getElementById("name").value;
        let password = document.getElementById("password").value;

        if (name === "") {
          alert("enter your name");
        } else if (password.length < 6) {
          alert("password must be 6 characters");
        } else {
          alert("registration successfully ..");
        }
      });

      let btn1 = document.getElementById("btn1");
      btn1.addEventListener("click", () => {
        document.getElementById("div").style.backgroundColor = "aqua";
      });
    </script>
  </body>
</html>
