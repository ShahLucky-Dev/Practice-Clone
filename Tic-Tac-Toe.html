<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="TTT.css" />
  </head>
  <body>
    <nav id="navbar">Tic-Tac-Toe</nav>
    <div class="gamecontainer">
      <div class="container">
        <div class="box bt-0 bl-0"><span class="boxtext"></span></div>
        <div class="box bt-0"><span class="boxtext"></span></div>
        <div class="box bt-0 br-0"><span class="boxtext"></span></div>
        <div class="box bl-0"><span class="boxtext"></span></div>
        <div class="box"><span class="boxtext"></span></div>
        <div class="box br-0"><span class="boxtext"></span></div>
        <div class="box bl-0 bb-0"><span class="boxtext"></span></div>
        <div class="box bb-0"><span class="boxtext"></span></div>
        <div class="box br-0 bb-0"><span class="boxtext"></span></div>
      </div>
      <div class="gameinfo">
        <h1>Welcome to tic tac toe..</h1>
        <br />
        <div>
          <span class="info">Turn for X</span><br /><br />
          <button id="reset" style="cursor: pointer">Reset</button>
        </div>
        <div class="imgbox">
          <img id="img" src="celebrating.gif" alt="Congratulation" />
        </div>
      </div>
    </div>
    <script src="TTT.js"></script>
  </body>
</html>
